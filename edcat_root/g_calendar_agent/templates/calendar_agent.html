<!DOCTYPE html>
<html lang="{{ lang_code }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdCat Calendar Agent (LangGraph)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-bubble-user { @apply bg-blue-600 text-white p-3 rounded-2xl rounded-tr-sm w-fit max-w-[80%] self-end shadow-sm; }
        .chat-bubble-agent { @apply bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tl-sm w-fit max-w-[80%] self-start shadow-sm whitespace-pre-wrap; }
        /* Markdown Table Styling */
        .chat-bubble-agent table { border-collapse: collapse; width: 100%; margin-top: 8px; margin-bottom: 8px; font-size: 0.875rem; }
        .chat-bubble-agent th { background-color: #e5e7eb; padding: 6px 12px; text-align: left; font-weight: 600; border: 1px solid #d1d5db; }
        .chat-bubble-agent td { padding: 6px 12px; border: 1px solid #d1d5db; }
        
        .typing { display: none; }
        .typing span { animation: blink 1.4s infinite both; height: 6px; width: 6px; background: #6b7280; border-radius: 50%; display: inline-block; margin: 0 1px; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl">📅</div>
            <div>
                <h1 class="font-bold text-gray-800 text-lg leading-tight">Agente de Agendamento</h1>
                <p class="text-xs text-green-600 font-medium">● Online (LangGraph)</p>
            </div>
        </div>
        <div class="text-xs text-gray-400">EdCat V2 AI</div>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6" id="chat-container">
        <div class="flex flex-col gap-4" id="chat-messages">
            <div class="chat-bubble-agent">Olá! Sou o Agente de Agendamento Inteligente da EdCat. Como posso ajudar com a sua reserva hoje?</div>
        </div>
        
        <!-- Typing Indicator -->
        <div class="typing mt-4 items-center self-start bg-gray-100 px-4 py-3 rounded-2xl rounded-tl-sm w-fit shadow-sm" id="typing-indicator">
            <span class="block"></span><span class="block"></span><span class="block"></span>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="message-input" autocomplete="off" class="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-gray-800 rounded-full px-5 py-3 outline-none transition-all" placeholder="Ex: 'Quero marcar um checkup na segunda às 10h'...">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 translate-x-0.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
            </button>
        </form>
        <div class="max-w-4xl mx-auto flex gap-2 mt-3 overflow-x-auto pb-1 scrollbar-hide">
            <button type="button" class="suggestion-btn whitespace-nowrap px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm rounded-full transition-colors border border-gray-200">Ver horários disponíveis</button>
            <button type="button" class="suggestion-btn whitespace-nowrap px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm rounded-full transition-colors border border-gray-200">Qual meu próximo agendamento?</button>
        </div>
    </footer>

    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        const container = document.getElementById('chat-container');

        const addMessage = (text, isUser) => {
            const div = document.createElement('div');
            div.className = isUser ? 'chat-bubble-user' : 'chat-bubble-agent';
            if (isUser) {
                div.textContent = text;
            } else {
                // Remove formatting constraints that cause markdown block glitches
                let cleanText = text.replace(/```markdown/g, '').replace(/```/g, '');
                div.innerHTML = marked.parse(cleanText, { breaks: true });
            }
            chatMessages.appendChild(div);
            container.scrollTop = container.scrollHeight;
        };

        const toggleTyping = (show) => {
            typingIndicator.style.display = show ? 'flex' : 'none';
            container.scrollTop = container.scrollHeight;
        };

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = messageInput.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            messageInput.value = '';
            toggleTyping(true);

            try {
                // Obtenha o idioma atual da URL (ex: /pt_BR/calendar_agent -> pt_BR)
                const currentPath = window.location.pathname;
                const pathParts = currentPath.split('/');
                const langCode = pathParts[1] || 'pt_BR';

                const response = await fetch(`/${langCode}/calendar_agent/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                const contentType = response.headers.get("content-type");
                let textResponse = "Erro inesperado do servidor.";
                
                if (contentType && contentType.includes("application/json")) {
                    const data = await response.json();
                    textResponse = data.response;
                } else {
                    const rawBody = await response.text();
                    textResponse = "O servidor retornou um HTML/Erro de rota em vez de JSON. Verifique a URL do endpoint.";
                    console.error("RAW Response:", rawBody);
                }

                toggleTyping(false);
                addMessage(textResponse, false);

            } catch (error) {
                console.error(error);
                toggleTyping(false);
                addMessage('Ops, falha de conexão. Verifique se o backend e a API do Google estão online.', false);
            }
        });

        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                messageInput.value = btn.textContent;
                chatForm.dispatchEvent(new Event('submit'));
            });
        });
    </script>
</body>
</html>
