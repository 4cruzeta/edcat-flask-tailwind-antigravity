<!DOCTYPE html>
<html lang="{{ g.lang_code or 'pt-BR' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EdCat V2{% endblock %}</title>
    <!-- Tailwind V4 Compiled Output -->
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white w-full min-h-screen flex flex-col font-sans antialiased">
    
    <!-- Flowbite Navbar Moderna -->
    <nav class="bg-white border-b border-gray-200 dark:bg-gray-900 dark:border-gray-700">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="{{ url_for('views.home', lang_code=g.lang_code) }}" class="flex items-center space-x-3 rtl:space-x-reverse group">
                <span class="self-center text-3xl font-extrabold whitespace-nowrap tracking-tight text-gray-900 dark:text-gray-100 transition hover:text-blue-600">
                    {{ _('EDCAT') }}
                </span>
            </a>
            
            <div class="flex items-center md:order-2 space-x-4 md:space-x-4 rtl:space-x-reverse">

                <!-- Botão Menu Idioma V1 Restorizado (Adaptado para Flowbite dropdown) -->
                <div>
                    <button id="lang-dropdown-button" data-dropdown-toggle="lang-dropdown-menu" data-dropdown-placement="bottom-end" class="text-gray-600 hover:text-blue-600 dark:text-gray-300 dark:hover:text-white font-medium inline-flex items-center transition-colors">
                        {{ _('Language') }}
                        <svg class="w-2.5 h-2.5 ms-2.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 4 4 4-4"/>
                        </svg>
                    </button>
                    <!-- Dropdown de Linguas -->
                    <div id="lang-dropdown-menu" class="z-10 hidden bg-white divide-y divide-gray-100 rounded-lg shadow-md w-32 dark:bg-gray-700">
                        <ul class="py-2 text-sm text-gray-700 dark:text-gray-200 text-left" aria-labelledby="lang-dropdown-button">
                          <li>
                            <a href="{{ change_lang_url('en_US') }}" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">English</a>
                          </li>
                          <li>
                            <a href="{{ change_lang_url('pt_BR') }}" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">Português</a>
                          </li>
                        </ul>
                    </div>
                </div>

                <!-- Botões de Ação Dinâmicos -->
                {% if g.user %}
                    <a href="{{ url_for('views.dashboard', lang_code=g.lang_code) }}" class="text-blue-600 bg-blue-50 hover:bg-blue-100 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-lg text-sm px-4 py-2 text-center transition-all dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-900/50">
                        Painel
                    </a>
                {% else %}
                    <a href="{{ url_for('views.login', lang_code=g.lang_code) }}" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 font-bold px-2 py-2 transition-colors">
                        {{ _('Login') }}
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <!-- Main Content Dynamic Block -->
    <main class="flex-grow w-full max-w-screen-xl mx-auto p-4 md:p-6 lg:p-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Elegante -->
    <footer class="bg-white border-t border-gray-200 dark:bg-gray-900 dark:border-gray-800 mt-auto">
        <div class="w-full mx-auto max-w-screen-xl p-6 md:flex md:items-center md:justify-between">
          <span class="text-sm text-gray-500 sm:text-center dark:text-gray-400">
              © 2026 <a href="#" class="hover:underline font-semibold text-gray-900 dark:text-white">EdCat V2™</a>. Inovação Excepcional.
          </span>
          <ul class="flex flex-wrap items-center mt-3 text-sm font-medium text-gray-500 dark:text-gray-400 sm:mt-0">
            <li><a href="#" class="hover:text-blue-600 me-4 md:me-6 transition-colors">Sobre</a></li>
            <li><a href="#" class="hover:text-blue-600 transition-colors">Suporte</a></li>
        </ul>
        </div>
    </footer>

    <!-- Scripts Core -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
